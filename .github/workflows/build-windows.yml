name: Build Windows EXE

# Build the standalone Windows .exe on GitHub's Windows runners.
# Trigger manually from the Actions tab, or on every push to main.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller JustTradesQuant.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JustTradesQuantV2-Windows
          path: dist/JustTradesQuantV2
          if-no-files-found: error
